<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Proyectos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <h2 class="text-center mb-4">Gestión de Proyectos</h2>

    <!-- FILTROS -->
    <div class="card mb-4">
        <div class="card-header bg-secondary text-white">
            Filtros
        </div>
        <div class="card-body">
            <div class="row g-3">

                <div class="col-md-3">
                    <label>Fecha</label>
                    <input type="date" id="filtroFecha" class="form-control">
                </div>

                <div class="col-md-3">
                    <label>Nombre</label>
                    <input type="text" id="filtroNombre" class="form-control">
                </div>

                <div class="col-md-3">
                    <label>Prioridad</label>
                    <select id="filtroPrioridad" class="form-select">
                        <option value="">Todas</option>
                        <option value="baja">Baja</option>
                        <option value="media">Media</option>
                        <option value="alta">Alta</option>
                    </select>
                </div>

                <div class="col-md-3 d-flex align-items-end gap-2">
                    <button id="btnFiltrar" class="btn btn-primary w-50">Buscar</button>
                    <button id="btnLimpiar" class="btn btn-outline-secondary w-50">Limpiar</button>
                </div>

            </div>
        </div>
    </div>

    <!-- BOTÓN -->
    <div class="text-end mb-3">
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalProyecto">
            Nuevo Proyecto
        </button>
    </div>

    <!-- LISTA -->
    <div id="listaProyectos"></div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modalProyecto">
    <div class="modal-dialog">
        <div class="modal-content">

            <form id="formProyecto">

                <div class="modal-header">
                    <h5 class="modal-title">Nuevo Proyecto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <div class="mb-3">
                        <label>Nombre</label>
                        <input type="text" id="nombre" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Descripción</label>
                        <textarea id="descripcion" class="form-control"></textarea>
                    </div>

                    <div class="mb-3">
                        <label>Fecha</label>
                        <input type="date" id="fecha" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Prioridad</label>
                        <select id="prioridad" class="form-select" required>
                            <option value="">Selecciona</option>
                            <option value="baja">Baja</option>
                            <option value="media">Media</option>
                            <option value="alta">Alta</option>
                        </select>
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary">Guardar</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                </div>

            </form>

        </div>
    </div>
</div>

<script src="practica_basica.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

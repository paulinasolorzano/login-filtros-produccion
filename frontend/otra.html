<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyectos Básica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Práctica 3 - Integradora</a>
            <div class="ms-auto">
                <span class="navbar-text text-white me-3" id="userInfo"></span>
                <a href="portada.html" class="btn btn-light btn-sm me-2">Volver</a>
                <button class="btn btn-danger btn-sm" onclick="logout()">Salir</button>
            </div>
        </div>
    </nav>
    
    <div class="container mt-5">
        <div class="alert alert-info">
            <h4>Práctica 3 -Formulario de Otra</h4>
        </div>
    </div>

 <script>
        const token = localStorage.getItem('token');
        const usuario = localStorage.getItem('usuario');
        const rol = localStorage.getItem('rol');

        if (!token) window.location.href = 'login.html';
        document.getElementById('userInfo').textContent = `${usuario} (${rol})`;

        function logout() {
            localStorage.clear();
            window.location.href = 'portada.html';
        }
</script>

   
</body>
</html>
